name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update (example: v0.1.0)"
        required: true
      draft_release:
        description: "Create the GitHub Release as a draft"
        required: false
        type: boolean
        default: true
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - chore-github-actions-release
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_os }}-${{ matrix.asset_arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_os: linux
            asset_arch: x86_64
          - runner: macos-14
            asset_os: macos
            asset_arch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
          elif [[ "${{ github.ref_type }}" == "branch" ]]; then
            tag="draft-test-${GITHUB_SHA::7}"
          else
            tag="${{ github.ref_name }}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libncurses-dev

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config ncurses

      - name: Configure build
        run: ./configure

      - name: Build binary
        run: make build

      - name: Stage release files
        shell: bash
        run: |
          pkg_dir="dist/itree"
          mkdir -p "$pkg_dir"
          cp itree README.md LICENSE "$pkg_dir/"

      - name: Create release archive
        shell: bash
        run: |
          archive="itree-${{ steps.release.outputs.tag }}-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.tar.gz"
          tar -czf "$archive" -C dist itree
          echo "ARCHIVE_NAME=$archive" >> "$GITHUB_ENV"

      - name: Generate checksum
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            shasum -a 256 "$ARCHIVE_NAME" > "${ARCHIVE_NAME}.sha256"
          else
            sha256sum "$ARCHIVE_NAME" > "${ARCHIVE_NAME}.sha256"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.ARCHIVE_NAME }}.sha256

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
            draft="${{ github.event.inputs.draft_release }}"
            prerelease="${{ github.event.inputs.prerelease }}"
          elif [[ "${{ github.ref_type }}" == "branch" ]]; then
            tag="draft-test-${GITHUB_SHA::7}"
            draft="true"
            prerelease="false"
          else
            tag="${{ github.ref_name }}"
            draft="false"
            prerelease="false"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "draft=${draft}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          draft: ${{ steps.release.outputs.draft }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.sha256
